<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatações adicionais</title>
</head>
<body>
    <p>
        <mark>texto marcado</mark>
    </p>
    <p><small>texto pequeno</small></p>
    <p><big>a tag big caiu porque não tem sentido</big></p>
    <p><del>texto excluido</del></p>
    <ins>inserir texto com semântica</ins>
    <p><u>inserir texto sem semântica</u></p>
    <p>Sobrescrito ou elevar ex: x<sup>2</sup></p>
    subriscrito palavra a baixo ex H<sub>2</sub>o
</body>
</html>
