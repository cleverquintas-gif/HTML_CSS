<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        a{
            color: darkolivegreen;
            text-decoration: none;
        }{}

        a:visited{
            color: darkkhaki;
        }
        a:hover{
            color: black;
            text-decoration: underline;
            background-color: brown;
        }
        a:{
            color: yellow;
        }
        a::after{
            content: normal;
            text-decoration: none;
            font-weight: normal;
            color: dimgray;
        }
    </style>

</head>
<body>
<h1>    </h1>
<ul>

    <li> <a href="st"target="_blank"> lasa</a>   </li>
    <li> <a href="st"target="_blank"> sad</a>   </li>
    <li> <a href="st" class="especial"> dav</a>   </li>

</ul>

</body>
</html>
